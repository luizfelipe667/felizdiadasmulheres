<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<title>Para Geovana ❤️</title>

<style>

body{
margin:0;
font-family:'Dancing Script',cursive;
background:#ff8fb1;
overflow-x:hidden;
color:white;
text-align:center;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

.heart{
font-size:90px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.finger{
font-size:40px;
animation:tap 1.2s infinite;
margin-bottom:10px;
}

@keyframes tap{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.hidden{
display:none;
}

#scrollText{
font-size:30px;
max-width:300px;
}

#buttonNext{
margin-top:30px;
padding:15px 25px;
border:none;
border-radius:25px;
font-size:22px;
background:white;
color:#ff4f87;
cursor:pointer;
}

.final{
font-size:40px;
opacity:0;
transition:1.5s;
}

.particle{
position:fixed;
font-size:22px;
pointer-events:none;
}

</style>
</head>

<body>

<!-- TELA 1 -->
<section id="tela1">

<div class="finger">👇</div>

<h1>Clique no coração</h1>

<div class="heart" onclick="explodir()">❤️</div>

</section>

<!-- TELA 2 -->

<section id="tela2" class="hidden">

<h1>Agora role a tela ❤️</h1>

</section>

<!-- TELA 3 -->

<section id="tela3">

<div id="scrollText"></div>

<button id="buttonNext" onclick="final()">Toque aqui Geovana</button>

</section>

<!-- TELA FINAL -->

<section id="telaFinal">

<div class="final" id="finalMsg">

Feliz Dia da Mulher 💐

<br><br>

Geovana,  
você é uma das coisas mais bonitas que já aconteceram na minha vida.

<br><br>

Feito com carinho pra você.

<br>

Te amo.

<br><br>

— Luiz Felipe ❤️

</div>

</section>

<script>

function explodir(){

document.getElementById("tela2").classList.remove("hidden")

for(let i=0;i<30;i++){

let p=document.createElement("div")

p.className="particle"

p.innerHTML="❤️"

p.style.left=Math.random()*window.innerWidth+"px"
p.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(p)

p.animate([
{transform:"translateY(0)",opacity:1},
{transform:"translateY(-200px)",opacity:0}
],{duration:1500})

setTimeout(()=>p.remove(),1500)

}

}

let texto="Geovana... desde que você apareceu, meu mundo ficou mais leve, mais bonito e cheio de motivos para sorrir."

let i=0

window.addEventListener("scroll",()=>{

let el=document.getElementById("scrollText")

if(i<texto.length){

let interval=setInterval(()=>{

el.innerHTML+=texto.charAt(i)

i++

if(i>=texto.length)clearInterval(interval)

},40)

}

})

function final(){

document.getElementById("finalMsg").style.opacity=1

}

</script>

</body>
</html>
