<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você 🌹</title>

<style>

body{
margin:0;
overflow:hidden;
background:#140010;
font-family:serif;
color:white;
}

#texto{
position:absolute;
top:15%;
width:100%;
text-align:center;
font-size:22px;
opacity:0.8;
letter-spacing:2px;
}

#mensagem{
position:absolute;
bottom:15%;
width:100%;
text-align:center;
font-size:26px;
opacity:0;
transition:2s;
}

canvas{
display:block;
}

</style>

</head>
<body>

<div id="texto">Toque na rosa 🌹</div>

<div id="mensagem">
Feliz Dia da Mulher<br>
Com todo meu carinho ❤️
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import {GLTFLoader} from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 5

let renderer = new THREE.WebGLRenderer({antialias:true,alpha:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

scene.background = new THREE.Color("#140010")

// LUZ CINEMATOGRÁFICA

let light = new THREE.PointLight(0xff4da6,4,100)
light.position.set(5,5,5)
scene.add(light)

let light2 = new THREE.PointLight(0xffffff,2,100)
light2.position.set(-5,3,3)
scene.add(light2)

let ambient = new THREE.AmbientLight(0xffffff,1.2)
scene.add(ambient)

let loader = new GLTFLoader()

let rose

loader.load("rose.glb", function(gltf){

rose = gltf.scene

rose.scale.set(2,2,2)

scene.add(rose)

})

let petals=[]

function createPetal(){

let geometry = new THREE.PlaneGeometry(0.2,0.2)

let material = new THREE.MeshBasicMaterial({
color:0xff4da6,
side:THREE.DoubleSide
})

let petal = new THREE.Mesh(geometry,material)

petal.position.x = (Math.random()-0.5)*6
petal.position.y = 4
petal.position.z = (Math.random()-0.5)*2

scene.add(petal)

petals.push(petal)

}

setInterval(createPetal,200)

window.addEventListener("click",()=>{

if(navigator.vibrate)
navigator.vibrate(200)

document.getElementById("mensagem").style.opacity=1

})

function animate(){

requestAnimationFrame(animate)

if(rose){

rose.rotation.y +=0.003

}

petals.forEach(p=>{

p.position.y -=0.02

p.rotation.z+=0.02

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
