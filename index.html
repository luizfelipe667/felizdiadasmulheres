<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .fundo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        /* TELA 1: ENTRADA */
        #tela-entrada {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .painel {
            position: absolute;
            width: 50%; height: 50%;
            background: linear-gradient(135deg, #2b0610 0%, #000 100%);
            border: 0.5px solid rgba(255, 183, 197, 0.2);
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .topo-esq { top: 0; left: 0; }
        .topo-dir { top: 0; right: 0; }
        .baixo-esq { bottom: 0; left: 0; }
        .baixo-dir { bottom: 0; right: 0; }

        .lacre-central {
            position: relative;
            font-size: 65px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            animation: pulsarRosa 2s infinite ease-in-out;
            z-index: 110;
        }

        .instrucao {
            position: absolute;
            bottom: 80px;
            color: white;
            letter-spacing: 3px;
            font-size: 11px;
            text-transform: uppercase;
            animation: pulsarTexto 2s infinite;
            z-index: 110;
        }

        /* TELA 2: TEXTO */
        #texto-container {
            position: relative;
            width: 85%;
            max-width: 400px;
            text-align: center;
            color: white;
            z-index: 10;
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s ease-out;
        }
