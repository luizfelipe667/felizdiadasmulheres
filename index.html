<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset para evitar scrolls e travamentos no Android */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; background-color: #000;
            color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Container Principal que ocupa tudo e recebe o clique */
        #container-geral {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            transition: background 1s ease;
        }

        /* Elementos da Tela 1 */
        #conteudo-inicial {
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; text-align: center;
        }

        .flor {
            font-size: 85px; filter: drop-shadow(0 0 15px #ff4d6d);
            animation: pulsar 2s infinite ease-in-out;
        }

        .piscar {
            margin-top: 20px; letter-spacing: 2px; font-size: 13px;
            text-transform: uppercase; color: #ffccd5;
            animation: brilho 1.5s infinite;
        }

        /* Elementos da Tela 2 (Inicia escondido) */
        #conteudo-mensagem {
            display: none; flex-direction: column; align-items: center;
            text-align: center; padding: 25px; animation: aparecer 0.8s ease-in;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin-bottom: 15px; }
        .texto { font-size: 18px; line-height: 1.6; max-width: 320px; }
        .assinatura { display: block; margin-top: 25px; font-family: 'Dancing Script'; font-size: 32px; color: #ff4d6d; }

        .btn-acao {
            margin-top: 35px; background: #ff4d6d; color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-weight: 600;
            font-size: 15px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.4);
        }

        /* Elementos da Tela 3 (Final) */
        #conteudo-final {
            display: none; flex-direction: column; align-items: center;
            animation: aparecer 1s ease-in;
        }

        .final-msg { font-family: 'Dancing Script', cursive; font-size: 60px; color: #ff4d6d; }

        /* Animações */
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes brilho { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes aparecer { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .coracao { position: fixed; pointer-events: none; z-index: 100; font-size: 25px; }
    </style>
</head>
<body>

    <div id="container-geral" onclick="gerenciarCliques()">
        
        <div id="conteudo-inicial">
            <div class="flor">🌹</div>
            <div class="piscar">Clique na tela ✨</div>
        </div>

        <div id="conteudo-mensagem">
            <h1>Geovana 🌹</h1>
            <p class="texto">
                Neste Dia das Mulheres, celebro a pessoa extraordinária que você é. Sua força e brilho iluminam tudo ao redor!
                <span class="assinatura">— Luiz Felipe ❤️</span>
            </p>
            <button class="btn-acao" id="botao-final">Clique aqui ❤️</button>
        </div>

        <div id="conteudo-final">
            <div class="final-msg">Te amo muito!</div>
            <div style="font-size: 65px; margin-top: 20px; filter: drop-shadow(0 0 10px #ff4d6d);">💖</div>
        </div>

    </div>

        if (etapa === 1) {
