<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        #cena {
            width: 90vw;
            height: 60vh;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        /* Vidro Inteiro */
        #vidro-frontal {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        /* Estilhaços Leves */
        .caco {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.4);
            pointer-events: none;
            z-index: 60;
            display: none;
        }

        #mensagem {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            opacity: 0;
            transition: opacity 1s;
            padding: 20px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin: 0; }
        p { font-size: 18px; line-height: 1.6; font-weight: 300; }
        .instrucao { color: white; letter-spacing: 4px; font-size: 10px; opacity: 0.7; margin-top: 20px; animation: pisca 1.5s infinite; }
        
        @keyframes pisca { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .estrela {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 20px;
        }
    </style>
</head>
<body onmousemove="rastro(event)" ontouchmove="rastro(event)">

    <div class="bg"></div>

    <div id="cena" onclick="quebrar()">
        <div id="vidro-frontal">
            <span style="font-size: 70px; filter: drop-shadow(0 0 15px #ff4d6d);">🌹</span>
            <div class="instrucao">TOQUE PARA QUEBRAR</div>
        </div>

        <div id="mensagem">
            <h1>Geovana 🌹</h1>
            <p>Sua força é inquebrável. Feliz Dia da Mulher!</p>
            <p style="font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d;">— Luiz Felipe ❤️</p>
        </div>
    </div>

<script>
    let jaFoi = false;

    function rastro(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        const s = document.createElement('div');
        s.className = 'estrela';
        s.innerHTML = '✨';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        document.body.appendChild(s);
        s.animate([{opacity: 1}, {opacity: 0}], {duration: 600});
        setTimeout(() => s.remove(), 600);
    }

    function quebrar() {
        if (jaFoi) return;
        jaFoi = true;

        document.getElementById('vidro-frontal').style.display = 'none';
        document.getElementById('mensagem').style.opacity = '1';

        const cena = document.getElementById('cena');
        const rect = cena.getBoundingClientRect();

        // Criar 20 cacos geométricos rápidos
        for (let i = 0; i < 20; i++) {
            const caco = document.createElement('div');
            caco.className = 'caco';
            const size = Math.random() * 60 + 20;
            caco.style.width = size + 'px';
            caco.style.height = size + 'px';
            caco.style.left = '50%';
            caco.style.top = '50%';
            caco.style.display = 'block';
            
            // Formas de cacos de vidro
            const shapes = [
                'polygon(50% 0%, 0% 100%, 100% 100%)',
                'polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%)',
                'polygon(0% 20%, 100% 0%, 80% 100%, 20% 80%)'
            ];
            caco.style.clipPath = shapes[Math.floor(Math.random() * shapes.length)];
            
            cena.appendChild(caco);

            const angulo = Math.random() * Math.PI * 2;
            const dist = 400 + Math.random() * 400;
            const x = Math.cos(angulo) * dist;
            const y = Math.sin(angulo) * dist;

            caco.animate([
                { transform: 'translate(-50%, -50%) rotate(0deg) scale(1)', opacity: 1 },
                { transform: `translate(${x}px, ${y}px) rotate(${Math.random()*360}deg) scale(0)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' });

            setTimeout(() => caco.remove(), 1000);
        }
    }
</script>
</body>
</html>
