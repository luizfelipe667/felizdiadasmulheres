<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Geovana ❤️</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle,#3b001d,#000);
font-family:serif;
color:white;
text-align:center;
}

#instrucao{
position:absolute;
top:15%;
width:100%;
font-size:22px;
opacity:0.8;
}

#mensagem{
position:absolute;
bottom:20%;
width:100%;
font-size:28px;
line-height:1.6;
padding:20px;
}

#coracao{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}
}

.petala{
position:absolute;
font-size:20px;
animation:cair linear infinite;
}

@keyframes cair{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

</style>

</head>
<body>

<div id="instrucao">Toque no coração ❤️</div>

<div id="coracao">❤️</div>

<div id="mensagem"></div>

<script>

let partes = [

"Geovana,",

"você é uma das pessoas mais especiais",

"que já apareceram na minha vida.",

"Seu jeito, seu sorriso",

"e a forma como você ilumina tudo ao redor",

"fazem o mundo ficar mais bonito.",

"Feliz Dia da Mulher ❤️"

]

let etapa = 0

let coracao = document.getElementById("coracao")
let mensagem = document.getElementById("mensagem")

coracao.onclick = () => {

if(etapa < partes.length){

mensagem.innerHTML += partes[etapa] + "<br>"
etapa++

if(navigator.vibrate)
navigator.vibrate(50)

}

}


// pétalas caindo

function criarPetala(){

let p = document.createElement("div")

p.className="petala"

p.innerHTML="🌸"

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),8000)

}

setInterval(criarPetala,400)

</script>

</body>
</html>
