<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Dia da Mulher</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#ffb6d0,#ffeaf5);
overflow:hidden;
text-align:center;
}

/* CONTAINER */

.container{
max-width:420px;
padding:20px;
position:relative;
z-index:5;
}

/* TITULO */

h1{
color:#b0004c;
margin-bottom:20px;
}

/* BOTÃO */

.btn{
background:#ff2e6e;
border:none;
padding:15px 26px;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ROSA */

.rose{
font-size:90px;
margin:20px 0;
display:none;
animation:crescer 2s ease forwards;
}

@keyframes crescer{

0%{
transform:scale(0);
}

100%{
transform:scale(1);
}

}

/* ENVELOPE */

.envelope{

width:200px;
height:120px;
background:#fff;
margin:20px auto;
position:relative;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;

}

.envelope:before{

content:'';
position:absolute;
top:-60px;
left:0;
width:0;
height:0;
border-left:100px solid transparent;
border-right:100px solid transparent;
border-bottom:60px solid #fff;
transition:1s;

}

.envelope.open:before{

transform:rotateX(180deg);

}

/* CARTA */

.card{

display:none;
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

.message{

font-size:17px;
line-height:1.6;
color:#880e4f;
white-space:pre-line;

}

/* CORAÇÕES */

.heart{

position:fixed;
bottom:-20px;
font-size:20px;
animation:subir 6s linear forwards;
opacity:.7;

}

@keyframes subir{

0%{transform:translateY(0)}
100%{transform:translateY(-110vh); opacity:0}

}

/* PARTÍCULAS */

.sparkle{

position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:.7;
animation:flutuar 5s linear forwards;

}

@keyframes flutuar{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Feliz Dia da Mulher 🌹</h1>

<button class="btn" onclick="iniciar()">Abrir Surpresa</button>

<div class="rose" id="rose">🌹</div>

<div class="envelope" id="envelope"></div>

<div class="card" id="card">

<h2>💌 Para Geovana</h2>

<div class="message" id="msg"></div>

</div>

</div>

<script>

const texto=`Geovana,

Hoje é um dia especial para lembrar o quanto mulheres incríveis fazem diferença no mundo.

E você é exatamente uma dessas pessoas.

Com sua dedicação, inteligência e carinho com todos ao seu redor,
você ilumina os caminhos das pessoas.

Que sua vida seja sempre cheia de sonhos,
conquistas e momentos felizes.

Feliz Dia da Mulher 🌹`;

function iniciar(){

document.querySelector(".btn").style.display="none";

document.getElementById("rose").style.display="block";

particulas();

setTimeout(()=>{

abrirEnvelope();

},2000);

}

function abrirEnvelope(){

let env=document.getElementById("envelope");

env.style.display="block";

setTimeout(()=>{

env.classList.add("open");

mostrarCarta();

},800);

}

function mostrarCarta(){

setTimeout(()=>{

let card=document.getElementById("card");

card.style.display="block";

digitar();

coracoes();

},1000);

}

function digitar(){

let i=0;

let area=document.getElementById("msg");

function escrever(){

if(i<texto.length){

area.innerHTML+=texto.charAt(i);

i++;

setTimeout(escrever,35);

}

}

escrever();

}

function coracoes(){

setInterval(()=>{

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+18)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},500);

}

function particulas(){

setInterval(()=>{

let p=document.createElement("div");

p.classList.add("sparkle");

p.style.left=Math.random()*100+"vw";

p.style.bottom="0px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),5000);

},200);

}

</script>

</body>
</html>
