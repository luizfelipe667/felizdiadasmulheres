<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Geovana ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ff8fb1;
font-family:'Pacifico',cursive;
overflow:hidden;
text-align:center;
}

.container{
position:relative;
}

.heart{
font-size:80px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.finger{
position:absolute;
font-size:40px;
top:-30px;
left:50%;
transform:translateX(-50%);
animation:tap 1s infinite;
}

@keyframes tap{
0%{opacity:0; transform:translate(-50%,0);}
50%{opacity:1; transform:translate(-50%,10px);}
100%{opacity:0; transform:translate(-50%,0);}
}

.explosion{
position:absolute;
font-size:30px;
opacity:0;
}

.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
font-size:26px;
color:white;
display:none;
}

.final{
display:none;
font-size:32px;
color:white;
animation:fade 2s forwards;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container" id="start">

<div class="finger">👇</div>

<div class="heart" onclick="explode()">❤️</div>

</div>

<div class="message" id="msg"></div>

<div class="final" id="final">
Feito com carinho pra você.<br>
Te amo!
</div>

<script>

let text="Geovana, desde que você apareceu na minha vida, tudo ficou mais bonito. Você é meu sorriso favorito, minha paz e meu amor. ❤️";

let i=0;

function explode(){

document.getElementById("start").style.display="none";

for(let j=0;j<25;j++){

let e=document.createElement("div");
e.className="explosion";
e.innerHTML="❤️";

let x=(Math.random()*300)-150;
let y=(Math.random()*300)-150;

e.style.left="50%";
e.style.top="50%";

document.body.appendChild(e);

setTimeout(()=>{
e.style.transition="1s";
e.style.transform=`translate(${x}px,${y}px)`;
e.style.opacity=1;
},10);

}

setTimeout(()=>{
showMessage();
},900);

}

function showMessage(){

let msg=document.getElementById("msg");
msg.style.display="block";

let interval=setInterval(()=>{

msg.innerHTML+=text[i];

i++;

if(i>=text.length){

clearInterval(interval);

setTimeout(()=>{
document.getElementById("msg").style.display="none";
document.getElementById("final").style.display="block";
},2000);

}

},70);

}

</script>

</body>
</html>
