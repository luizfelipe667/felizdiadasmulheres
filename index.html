<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeito Corações</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Coração Principal */
        .heart-main {
            position: relative;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #ff4d6d, #c9184a);
            transform: rotate(-45deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 10;
            animation: pulse 2s infinite ease-in-out;
        }

        .heart-main::before,
        .heart-main::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: inherit;
            border-radius: 50%;
        }

        .heart-main::before { top: -75px; left: 0; }
        .heart-main::after { left: 75px; top: 0; }

        /* Corações de Fundo (Partículas) */
        .heart-small {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff758f;
            transform: rotate(-45deg);
            opacity: 0.6;
            z-index: 1;
        }

        .heart-small::before,
        .heart-small::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: inherit;
            border-radius: 50%;
        }

        .heart-small::before { top: -15px; left: 0; }
        .heart-small::after { left: 15px; top: 0; }

        /* Animações */
        @keyframes pulse {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.05); }
        }

        /* Posicionamento aleatório para simular a imagem */
        .h1 { top: -80px; left: -60px; transform: rotate(-20deg) scale(0.8); background: #ffb3c1; }
        .h2 { top: 60px; right: -90px; transform: rotate(15deg) scale(1.2); background: #ff4d6d; }
        .h3 { bottom: -70px; left: 20px; transform: rotate(-60deg) scale(0.6); }
        .h4 { top: -40px; right: -50px; opacity: 0.4; }

    </style>
</head>
<body>

    <div class="container">
        <div class="heart-main"></div>

        <div class="heart-small h1"></div>
        <div class="heart-small h2"></div>
        <div class="heart-small h3"></div>
        <div class="heart-small h4"></div>
    </div>

</body>
</html>
