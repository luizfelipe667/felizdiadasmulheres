<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Dia da Mulher 🌹</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle at center,#3b001d,#120008);
font-family:Arial;
overflow:hidden;
color:white;
}

/* INSTRUÇÃO */

#instrucao{
position:absolute;
top:40%;
font-size:22px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

/* ROSA */

.rosa{
position:relative;
width:120px;
height:120px;
cursor:pointer;
}

.petala{
position:absolute;
width:80px;
height:80px;
background:radial-gradient(circle,#ff2e6e,#c0003f);
border-radius:50%;
top:20px;
left:20px;
transform-origin:center bottom;
transition:1.8s ease;
}

.petala:nth-child(1){transform:rotate(0deg)}
.petala:nth-child(2){transform:rotate(45deg)}
.petala:nth-child(3){transform:rotate(90deg)}
.petala:nth-child(4){transform:rotate(135deg)}
.petala:nth-child(5){transform:rotate(180deg)}
.petala:nth-child(6){transform:rotate(225deg)}
.petala:nth-child(7){transform:rotate(270deg)}
.petala:nth-child(8){transform:rotate(315deg)}

/* HASTE */

.haste{
position:absolute;
width:6px;
height:140px;
background:#1aa33c;
left:57px;
top:100px;
border-radius:3px;
}

/* ABERTURA */

.aberta .petala{
transform:scale(1.4) rotate(var(--rot));
}

/* CARTA */

#mensagem{
position:absolute;
bottom:8%;
background:white;
color:#333;
padding:25px;
width:85%;
max-width:350px;
border-radius:14px;
text-align:center;
opacity:0;
transform:translateY(30px);
transition:1.5s;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

#mensagem.mostrar{
opacity:1;
transform:translateY(0);
}

h1{
color:#c0004b;
margin-top:0;
}

/* PETALAS CAINDO */

.petala-caindo{
position:absolute;
top:-20px;
color:#ff3d7a;
font-size:22px;
animation:cair linear forwards;
}

@keyframes cair{
0%{transform:translateY(-20px) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

</style>
</head>

<body>

<div id="instrucao">🌹 Toque na rosa</div>

<div class="rosa" id="rosa">

<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>
<div class="petala"></div>

<div class="haste"></div>

</div>

<div id="mensagem">

<h1>Feliz Dia da Mulher</h1>

<p>

Geovana,

Assim como essa rosa floresce lentamente,
sua presença ilumina tudo ao redor.

Sua delicadeza, sua força
e seu carinho tornam o mundo
um lugar mais bonito.

Que hoje você se lembre
do quanto é especial.

Com todo carinho ❤️

</p>

</div>

<script>

const rosa = document.getElementById("rosa")
const mensagem = document.getElementById("mensagem")
const instrucao = document.getElementById("instrucao")

rosa.addEventListener("click", ()=>{

rosa.classList.add("aberta")

instrucao.style.display="none"

if(navigator.vibrate){
navigator.vibrate([80,40,80])
}

setTimeout(()=>{
mensagem.classList.add("mostrar")
},1200)

})

/* PETALAS CAINDO */

function criarPetala(){

const petala = document.createElement("div")
petala.classList.add("petala-caindo")

petala.innerHTML="🌸"

petala.style.left = Math.random()*100+"vw"
petala.style.animationDuration = 4 + Math.random()*4 + "s"

document.body.appendChild(petala)

setTimeout(()=>{
petala.remove()
},8000)

}

setInterval(criarPetala,600)

</script>

</body>
</html>
