<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Premium - Geovana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Fundo de Galáxia Elegante */
        .stars-container {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        /* O CARD DE OURO ROSÉ */
        #luxury-card {
            width: 90%;
            max-width: 380px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 60px 30px;
            border: 1px solid rgba(255, 183, 197, 0.3);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out;
            position: relative;
        }

        /* Brilho Metálico Dinâmico */
        #luxury-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,215,225,0.2) 40%, rgba(255,255,255,0.4) 50%, rgba(255,215,225,0.2) 60%, transparent 80%);
            background-size: 200% 200%;
            background-position: var(--shine-x, 50%) var(--shine-y, 50%);
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .main-icon {
            font-size: 80px;
            filter: drop-shadow(0 0 25px #ff4d6d);
            margin-bottom: 25px;
            display: inline-block;
        }

        #final-message {
            display: none;
            opacity: 0;
            transform: translateZ(60px);
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 48px; margin: 0; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .gold-text { color: #ffb7c5; letter-spacing: 5px; font-size: 10px; text-transform: uppercase; margin-top: 20px; }
        .premium-body { font-family: 'Cinzel', serif; font-size: 16px; line-height: 1.8; color: #eee; margin-top: 30px; font-weight: 400; }
        .signature { display: block; margin-top: 35px; font-family: 'Dancing Script'; font-size: 32px; color: #ff4d6d; }

        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
        }
    </style>
</head>
<body onmousemove="updateCard(event)" ontouchmove="updateCard(event)">

    <div class="stars-container" id="stars-bg"></div>

    <div id="luxury-card">
        <div id="cover">
            <div class="main-icon">🌹</div>
            <h1>Geovana</h1>
            <p class="gold-text">Um Toque de Brilho</p>
        </div>

        <div id="final-message">
            <h1>Feliz Dia da Mulher</h1>
            <div class="premium-body">
                Para a mulher que redefine a palavra elegância e força. Seu brilho é a constelação que guia meus melhores pensamentos.
                <br>
                <span class="signature">— Luiz Felipe ❤️</span>
            </div>
        </div>
    </div>

<script>
    const card = document.getElementById('luxury-card');
    const bg = document.getElementById('stars-bg');
    let revealed = false;

    // Criar estrelas fixas de luxo no fundo
    for(let i=0; i<100; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = Math.random() * 3 + 'px';
        s.style.height = s.style.width;
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.opacity = Math.random();
        bg.appendChild(s);
    }

    function updateCard(e) {
        const rect = card.getBoundingClientRect();
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        
        // Movimento do Brilho Metálico
        card.style.setProperty('--shine-x', `${(x / rect.width) * 100}%`);
        card.style.setProperty('--shine-y', `${(y / rect.height) * 100}%`);

        // Inclinação 3D Suave
        const rotX = ((y / rect.height) - 0.5) * -15;
        const rotY = ((clientX / window.innerWidth) - 0.5) * 25;
        card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

        // Criar estrelas cintilantes no toque (as estrelinhas que você adorou!)
        spawnStar(clientX, clientY);
    }

    function spawnStar(x, y) {
        const s = document.createElement('div');
        s.innerHTML = '✨';
        s.style.position = 'fixed';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        s.style.color = '#fff';
        s.style.fontSize = Math.random() * 15 + 10 + 'px';
        s.style.pointerEvents = 'none';
        s.style.zIndex = '100';
        document.body.appendChild(s);

        s.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) scale(0)`, opacity: 0 }
        ], { duration: 1000 });
        setTimeout(() => s.remove(), 1000);
    }

    card.onclick = function() {
        if (revealed) return;
        revealed = true;
        
        document.getElementById('cover').style.transition = '0.5s';
        document.getElementById('cover').style.opacity = '0';
        document.getElementById('cover').style.transform = 'translateZ(0px) scale(0.8)';
        
        setTimeout(() => {
            document.getElementById('cover').style.display = 'none';
            const msg = document.getElementById('final-message');
            msg.style.display = 'block';
            setTimeout(() => { 
                msg.style.opacity = '1'; 
                msg.style.transform = 'translateZ(60px) scale(1)';
            }, 50);
            
            // Explosão de Ouro
            for(let i=0; i<40; i++) spawnStar(window.innerWidth/2, window.innerHeight/2);
        }, 500);
    };

    // Resetar posição quando parar de tocar
    const reset = () => card.style.transform = 'rotateX(0) rotateY(0)';
    window.addEventListener('touchend', reset);
    window.addEventListener('mouseleave', reset);
</script>

</body>
</html>
