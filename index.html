<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-rose: #ff8fa3;
            --p-deep: #ff4f87;
            --p-gold: #f4d03f;
            --text: #2c1a1a;
            --glass: rgba(255, 255, 255, 0.94);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background: #fdf2f4;
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* FUNDO PREMIUM ABSTRATO (Glassmorphism Art) */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: moveShape 20s ease-in-out infinite;
        }
        .shape1 { width: 400px; height: 400px; background: var(--p-rose); top: -100px; left: -100px; }
        .shape2 { width: 300px; height: 300px; background: #ffccd5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .shape3 { width: 250px; height: 250px; background: #fff3f5; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes moveShape {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* CONTAINER PRINCIPAL */
        .container {
            width: 88%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 45px 30px;
            box-shadow: 0 25px 60px rgba(255, 79, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 1);
            z-index: 100;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        /* ÁREA DE TOQUE DO CORAÇÃO */
        .heart-interaction-area {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 200;
        }
