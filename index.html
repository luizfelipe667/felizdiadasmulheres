<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Ultra-Premium - Geovana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* RESET E FONTES PADRÃO */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            perspective: 2500px; /* PERSPECTIVA AUMENTADA PARA EFEITO 3D MAIS SUTIL */
        }

        /* FUNDO DE GALÁXIA ELEGANTE (CONSERVAÇÃO) */
        .stars-container {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        /* O CARD DE OURO ROSÉ ULTRA-PREMIUM */
        #luxury-card {
            width: 90%;
            max-width: 380px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            backdrop-filter: blur(25px); /* BLUR LIGEIRAMENTE REDUZIDO PARA MELHOR PERFORMANCE */
            -webkit-backdrop-filter: blur(25px);
            border-radius: 45px; /* BORDAS MAIS ARREDONDADAS E ELEGANTES */
            padding: 60px 30px;
            border: 1px solid rgba(255, 183, 197, 0.25); /* BORDA MAIS SUTIL */
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 30px rgba(255,77,109,0.1); /* ADICIONADA AURA DE LUZ */
            text-align: center;
            z-index: 10;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out, box-shadow 0.3s ease; /* TRANSIÇÕES SUAVES */
            position: relative;
            overflow: hidden; /* IMPORTANTE PARA O EFEITO DE BRILHO INTERNO */
        }

        /* BRILHO HOLOGRÁFICO METÁLICO (REFINAMENTO) */
        #luxury-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 45px;
            background: linear-gradient(105deg, transparent 20%, rgba(255,215,225,0.1) 40%, rgba(255,255,255,0.3) 50%, rgba(255,215,225,0.1) 60%, transparent 80%);
            background-size: 250% 250%; /* AUMENTADO PARA BRILHO MAIS SUAVE */
            background-position: var(--shine-x, 50%) var(--shine-y, 50%);
            pointer-events: none;
            mix-blend-mode: overlay;
            transition: background-position 0.1s ease-out; /* TRANSIÇÃO PARA O BRILHO SEGUIR SUAVEMENTE */
        }

        /* ANIMAÇÃO DE FLUTUAÇÃO DO ÍCONE (CONSERVAÇÃO COM AJUSTE) */
        .main-icon {
            font-size: 75px; /* LIGEIRAMENTE REDUZIDO */
            filter: drop-shadow(0 0 20px rgba(255, 77, 109, 0.4));
            margin-bottom: 25px;
            display: inline-block;
            animation: floatingIcon 4s infinite ease-in-out;
        }

        @keyframes floatingIcon {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px rgba(255, 77, 109, 0.4)); }
            50% { transform: translateY(-10px) scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 77, 109, 0.5)); }
        }

        /* TEXTO CAPA (CONSERVAÇÃO) */
        .gold-text { color: #ffb7c5; letter-spacing: 5px; font-size: 10px; text-transform: uppercase; margin-top: 20px; font-weight: 300; opacity: 0.8; }

        /* HOMENAGEM FINAL (O EFEITO DE REVELAÇÃO PROGRESSIVA ESTÁ AQUI) */
        #final-message {
            display: none;
            opacity: 0;
            transform: translateZ(50px) scale(0.9); /* INICIA LIGEIRAMENTE MENOR */
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); /* TRANSIÇÃO MAIS LONGA E FLUIDA */
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 44px; margin: 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .premium-body { font-family: 'Cinzel', serif; font-size: 15px; line-height: 2; color: #f0f0f0; margin-top: 35px; font-weight: 400; letter-spacing: 0.5px; }

        /* DELAYS PARA REVELAÇÃO PROGRESSIVA */
        .premium-body span, .signature { display: inline-block; opacity: 0; transform: translateY(15px); transition: all 1s ease-out; }

        .signature { display: block; margin-top: 40px; font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d; text-shadow: 0 0 10px rgba(255,77,109,0.5); }

        /* ESTRELAS CINTILANTES NO TOQUE (MANUTENÇÃO) */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
        }

        .tap-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: blinkTap 2s infinite;
        }

        @keyframes blinkTap {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

    </style>
</head>
<body onmousemove="updateCard(event)" ontouchmove="updateCard(event)" id="main-body">

    <div class="stars-container" id="stars-bg"></div>

    <div id="luxury-card">
        <div id="cover">
            <div class="main-icon">🌹</div>
            <h1>Geovana</h1>
            <p class="gold-text">Um Toque de Luz</p>
            <div class="tap-hint">Toque para Geovana</div>
        </div>

        <div id="final-message">
            <h1 id="h1-final">Feliz Dia da Mulher</h1>
            <div class="premium-body">
                <span id="p-text-1">Para a mulher que redefine a elegância e força. Seu brilho é a constelação que guia meus melhores pensamentos.</span>
                <span id="p-text-2" class="signature">— Luiz Felipe ❤️</span>
            </div>
        </div>
    </div>

<script>
    const card = document.getElementById('luxury-card');
    const bg = document.getElementById('stars-bg');
    const body = document.getElementById('main-body');
    let revealed = false;

    // Criar estrelas fixas de luxo no fundo (conserção)
    function createBgStars() {
        for(let i=0; i<100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.opacity = Math.random();
            bg.appendChild(s);
        }
    }
    createBgStars();

    function updateCard(e) {
        if (revealed) {
            updateShine(e);
            updateTilt(e);
        } else {
            updateTilt(e);
        }
        // Criar estrelas cintilantes no toque (as estrelinhas que você adorou!)
        spawnStar(e);
    }

        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
