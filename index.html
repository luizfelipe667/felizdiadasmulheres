<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Geovana ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#ff9bb3;
font-family:'Dancing Script',cursive;
color:white;
text-align:center;
overflow:hidden;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:38px;
}

.heart{
font-size:90px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.finger{
font-size:40px;
animation:tap 1.2s infinite;
}

@keyframes tap{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

.text{
font-size:30px;
max-width:320px;
line-height:1.4;
}

button{
margin-top:30px;
padding:15px 25px;
border:none;
border-radius:25px;
font-size:22px;
background:white;
color:#ff4f87;
cursor:pointer;
}

.hidden{
display:none;
}

.final{
font-size:38px;
opacity:0;
transition:1.5s;
}

.particle{
position:fixed;
font-size:22px;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container" id="tela1">

<div class="finger">👇</div>

<h1>Clique no coração</h1>

<div class="heart" onclick="start()">❤️</div>

</div>


<div class="container hidden" id="tela2">

<div class="text" id="text"></div>

<button onclick="mostrarFinal()">Toque aqui Geovana</button>

</div>


<div class="container hidden" id="tela3">

<div class="final" id="finalMsg">

Feliz Dia da Mulher 🌹

<br><br>

Geovana,  
você é uma das coisas mais bonitas que já aconteceram na minha vida.

<br><br>

Seu sorriso ilumina meus dias  
e sua presença deixa tudo mais especial.

<br><br>

Feito com carinho pra você.

<br>

Te amo.

<br><br>

— Luiz Felipe ❤️

</div>

</div>

<script>

let texto="Geovana... desde que você apareceu, meu mundo ficou mais leve, mais bonito e cheio de motivos para sorrir.";

let i=0

function start(){

explosao()

document.getElementById("tela1").classList.add("hidden")
document.getElementById("tela2").classList.remove("hidden")

escrever()

}

function escrever(){

let area=document.getElementById("text")

let interval=setInterval(()=>{

area.innerHTML+=texto.charAt(i)

i++

if(i>=texto.length)clearInterval(interval)

},45)

}

function mostrarFinal(){

document.getElementById("tela2").classList.add("hidden")
document.getElementById("tela3").classList.remove("hidden")

setTimeout(()=>{

document.getElementById("finalMsg").style.opacity=1

},200)

}

function explosao(){

for(let i=0;i<35;i++){

let p=document.createElement("div")

p.className="particle"

p.innerHTML="❤️"

p.style.left=Math.random()*window.innerWidth+"px"
p.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(p)

p.animate([
{transform:"translateY(0)",opacity:1},
{transform:"translateY(-200px)",opacity:0}
],{duration:1500})

setTimeout(()=>p.remove(),1500)

}

}

</script>

</body>
</html>
