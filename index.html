<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* TELA 1 */
        #tela1 {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .rosa {
            font-size: 80px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            animation: pulsar 1.5s infinite ease-in-out;
            pointer-events: none; /* O toque passa por ela e vai pro fundo */
        }

        .instrucao {
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 12px;
            text-transform: uppercase;
            color: #ffccd5;
            pointer-events: none;
        }

        /* TELA 2 */
        #tela2 {
            display: none;
            width: 85%;
            max-width: 400px;
            text-align: center;
            z-index: 50;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin-bottom: 10px; }
        .texto { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        
        #btn-final {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        /* TELA 3 */
        #tela3 {
            display: none;
            text-align: center;
            z-index: 50;
        }

        .final { font-family: 'Dancing Script', cursive; font-size: 60px; color: #ff4d6d; }

        @keyframes pulsar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .coracao {
            position: fixed;
            pointer-events: none;
            font-size: 25px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="tela1">
        <div class="rosa">🌹</div>
        <div class="instrucao">Toque em qualquer lugar ✨</div>
    </div>

    <div id="tela2">
        <h1>Geovana 🌹</h1>
        <div class="texto">
            Você é extraordinária e merece ser celebrada todos os dias!
            <br><br>
            <span style="font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d;">— Luiz Felipe ❤️</span>
        </div>
        <button id="btn-final">Clique aqui ❤️</button>
    </div>

    <div id="tela3">
        <div class="final">Te amo muito!</div>
        <div style="font-size: 50px; margin-top: 20px;">💖</div>
    </div>

<script>
    const tela1 = document.getElementById('tela1');
    const tela2 = document.getElementById('tela2');
    const tela3 = document.getElementById('tela3');
    const btnFinal = document.getElementById('btn-final');

    // FUNÇÃO PARA MUDAR DA TELA 1 PARA A 2
    function irParaTela2() {
        tela1.style.display = 'none';
        tela2.style.display = 'block';
    }

    // FUNÇÃO PARA MUDAR DA TELA 2 PARA A 3
    function irParaTela3(e) {
        if(e) e.stopPropagation(); 
        tela2.style.display = 'none';
        tela3.style.display = 'block';
        setInterval(criarCoracao, 300);
    }

    // ESCUTADORES GLOBAIS (Garante que funcione em qualquer lugar)
    tela1.addEventListener('click', irParaTela2);
    tela1.addEventListener('touchstart', (e) => {
        e.preventDefault();
        irParaTela2();
    }, {passive: false});

    btnFinal.addEventListener('click', irParaTela3);
    btnFinal.addEventListener('touchstart', (e) => {
        e.preventDefault();
        irParaTela3();
    }, {passive: false});

    function criarCoracao() {
        const c = document.createElement('div');
        c.className = 'coracao';
        c.innerHTML = '❤️';
        c.style.left = Math.random() * window.innerWidth + 'px';
        c.style.top = window.innerHeight + 'px';
        document.body.appendChild(c);
        
        c.animate([
            { transform: 'translateY(0)', opacity: 1 },
            { transform: `translateY(-${window.innerHeight + 100}px)`, opacity: 0 }
        ], { 
            duration: 3000 + Math.random() * 2000, 
            easing: 'linear' 
        }).onfinish = () => c.remove();
    }
</script>
</body>
</html>
