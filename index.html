<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; background-color: #000;
            color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; touch-action: none;
        }

        .pagina {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 25px;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        #tela1 {
            background: radial-gradient(circle at center, #3d0a1a 0%, #000 100%);
            z-index: 30;
        }

        #tela2 {
            background: #050505;
            z-index: 20;
            opacity: 0;
            filter: blur(10px);
            transform: scale(1.1);
        }

        #tela3 {
            background: #000;
            z-index: 10;
            display: none;
        }

        .flor {
            font-size: 90px; filter: drop-shadow(0 0 20px #ff4d6d);
            animation: pulsar 2.5s infinite ease-in-out;
            pointer-events: none;
        }

        .piscar {
            margin-top: 30px; letter-spacing: 4px; font-size: 11px;
            text-transform: uppercase; color: #ffccd5;
            animation: brilho 2s infinite;
            pointer-events: none;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 48px; color: #ff4d6d; margin-bottom: 20px; }
        
        .texto { 
            font-size: 19px; 
            line-height: 1.7; 
            max-width: 330px; 
            font-weight: 300;
            text-align: center; /* Garante a centralização do bloco de texto */
            margin: 0 auto;
        }

        .assinatura { display: block; margin-top: 25px; font-family: 'Dancing Script'; font-size: 34px; color: #ff4d6d; }

        .btn-premium {
            background: linear-gradient(135deg, #ff4d6d 0%, #c9184a 100%);
            color: white; border: none; padding: 18px 50px; border-radius: 50px;
            font-weight: 600; font-size: 15px; margin-top: 40px;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.3);
            cursor: pointer;
        }
