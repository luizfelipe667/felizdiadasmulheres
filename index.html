<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 2000px;
        }

        .bg-gradient {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b0610 0%, #000 100%);
            z-index: 1;
        }

        /* O PORTAL QUE SE ABRE */
        #container-luxo {
            width: 90vw;
            height: 70vh;
            max-width: 400px;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Peças do "Portão" de Luxo */
        .painel {
            position: absolute;
            width: 50%;
            height: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 183, 197, 0.4);
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Posicionamento dos 4 quadrantes */
        .p1 { top: 0; left: 0; border-radius: 40px 0 0 0; }
        .p2 { top: 0; right: 0; border-radius: 0 40px 0 0; }
        .p3 { bottom: 0; left: 0; border-radius: 0 0 0 40px; }
        .p4 { bottom: 0; right: 0; border-radius: 0 0 40px 0; }

        /* Estilo da Rosa Centralizada */
        .trava-central {
            position: absolute;
            z-index: 30;
            font-size: 80px;
            filter: drop-shadow(0 0 20px #ff4d6d);
            transition: all 0.8s ease;
        }

        /* MENSAGEM DINÂMICA (POR TRÁS) */
        #mensagem-final {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0;
            transform: scale(0.5) translateZ(-200px);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            padding: 20px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 50px; color: #ff4d6d; margin: 0; }
        p { font-size: 19px; line-height: 1.6; font-weight: 300; }
        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 35px; color: #ffb7c5; }

        /* Estrelinhas cintilantes */
        .estrela-trail {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            color: white;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
            font-size: 24px;
        }
    </style>
</head>
<body onmousemove="rastro(event)" ontouchmove="rastro(event)" onclick="abrirPortal(event)">

    <div class="bg-gradient"></div>

    <div id="container-luxo">
        <div class="trava-central" id="rosa">🌹</div>
        
        <div class="painel p1" id="p1"></div>
        <div class="painel p2" id="p2"></div>
        <div class="painel p3" id="p3"></div>
        <div class="painel p4" id="p4"></div>

        <div id="mensagem-final">
            <h1>Geovana 🌹</h1>
            <p><strong>Feliz Dia da Mulher!</strong></p>
            <p>Sua existência torna o mundo um lugar mais bonito e iluminado.</p>
            <p>Você é uma mulher extraordinária e forte!</p>
            <span class="assinatura">— Luiz Felipe ❤️</span>
        </div>
    </div>

<script>
    let aberto = false;

    function rastro(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        
        const s = document.createElement('div');
        s.className = 'estrela-trail';
        s.innerHTML = '✨';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        document.body.appendChild(s);

        s.animate([
            { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) scale(0)`, opacity: 0 }
        ], { duration: 1000 });

        setTimeout(() => s.remove(), 1000);
    }

    function abrirPortal(e) {
        if (aberto) {
            explosao(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            return;
        }
        aberto = true;

        const rosa = document.getElementById('rosa');
        const m = document.getElementById('mensagem-final');

        // A rosa gira e some
        rosa.style.transform = 'scale(0) rotate(720deg)';
        rosa.style.opacity = '0';

        // Painéis se desdobram para os cantos com rotação 3D
        document.getElementById('p1').style.transform = 'translate(-120%, -120%) rotate(-45deg)';
        document.getElementById('p2').style.transform = 'translate(120%, -120%) rotate(45deg)';
        document.getElementById('p3').style.transform = 'translate(-120%, 120%) rotate(45deg)';
        document.getElementById('p4').style.transform = 'translate(120%, 120%) rotate(-45deg)';

        // Mensagem surge do fundo com zoom
        setTimeout(() => {
            m.style.opacity = '1';
            m.style.transform = 'scale(1.1) translateZ(0)';
            
            // Explosão massiva de estrelas
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    explosao(window.innerWidth/2, window.innerHeight/2);
                }, i * 40);
            }
        }, 500);
    }

    function explosao(x, y) {
        const itens = ['✨', '💖', '🌹', '💎'];
        const e = document.createElement('div');
        e.className = 'estrela-trail';
        e.innerHTML = itens[Math.floor(Math.random()*itens.length)];
        e.style.left = x + 'px';
        e.style.top = y + 'px';
        document.body.appendChild(e);

        const angle = Math.random() * Math.PI * 2;
        const dist = 150 + Math.random() * 150;

        e.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
        ], { duration: 1500, easing: 'ease-out' });

        setTimeout(() => e.remove(), 1500);
    }
</script>

</body>
</html>
