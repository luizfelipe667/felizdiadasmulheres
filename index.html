<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* Estrutura de Telas */
        .tela {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.8s ease-in-out;
        }

        /* TELA 1 */
        #tela1 {
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            z-index: 3;
            cursor: pointer;
        }

        /* TELA 2 */
        #tela2 {
            background: #0a0a0a;
            z-index: 2;
            padding: 25px;
            text-align: center;
        }

        /* TELA 3 */
        #tela3 {
            background: #000;
            z-index: 1;
            display: none; /* Só aparece no final */
        }

        /* Elementos Visuais */
        .flor {
            font-size: 80px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            animation: pulsar 2s infinite ease-in-out;
        }

        .piscar {
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 13px;
            text-transform: uppercase;
            color: #ffccd5;
            animation: brilho 1.5s infinite;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 42px; color: #ff4d6d; margin-bottom: 15px; }
        .texto { font-size: 17px; line-height: 1.6; max-width: 300px; }
        .assinatura { display: block; margin-top: 25px; font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d; }

        .btn-clique {
            margin-top: 35px; background: #ff4d6d; color: white; border: none;
            padding: 15px 35px; border-radius: 50px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            cursor: pointer;
        }

        .final { font-family: 'Dancing Script', cursive; font-size: 55px; color: #ff4d6d; text-align: center; }

        /* Animações */
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes brilho { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .coracao { position: fixed; pointer-events: none; z-index: 100; font-size: 25px; }
        .subir { transform: translateY(-100%); }
    </style>
</head>
<body>

    <div id="tela1" class="tela" onclick="abrir()">
        <div class="flor">🌹</div>
        <div class="piscar">Toque na tela ✨</div>
    </div>

    <div id="tela2" class="tela">
        <h1>Geovana 🌹</h1>
        <div class="texto">
            Neste Dia das Mulheres, celebro a pessoa extraordinária que você é. Sua força e brilho iluminam tudo ao redor!
            <span class="assinatura">— Luiz Felipe ❤️</span>
        </div>
        <button class="btn-clique" onclick="finalizar()">Clique aqui ❤️</button>
    </div>

    <div id="tela3" class="tela">
        <div class="final">Te amo muito!</div>
        <div style="font-size: 60px; margin-top: 20px;">💖</div>
    </div>

<script>
    function abrir() {
        document.getElementById('tela1').classList.add('subir');
