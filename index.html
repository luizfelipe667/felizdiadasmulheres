<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset para evitar qualquer bloqueio de clique */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #fce4ec;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* O Card agora é o próprio botão */
        .card-clicavel {
            width: 85%;
            max-width: 350px;
            background: white;
            border-radius: 30px;
            padding: 50px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            z-index: 10;
        }

        .card-clicavel:active {
            transform: scale(0.98);
        }

        .heart {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 { font-family: 'Dancing Script', cursive; color: #ff4f87; font-size: 35px; margin-bottom: 15px; }
        .message { font-size: 17px; line-height: 1.6; color: #3d1422; display: none; }
        .instruction { color: #888; font-size: 14px; }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="card-clicavel" id="mainCard" onclick="revelarConteudo()">
        <div id="conteudoInicial">
            <span class="heart">❤️</span>
            <h1>Para Geovana</h1>
            <p class="instruction">Toque em qualquer lugar do card</p>
        </div>

        <div id="conteudoFinal" style="display: none;">
            <h1>Geovana 🌹</h1>
            <p style="font-size: 18px; line-height: 1.6;">
                Você é a luz que transforma os meus dias em algo extraordinário.
                <br><br>
                <strong>Te amo infinitamente.</strong>
            </p>
            <p style="font-family: 'Dancing Script', cursive; font-size: 26px; margin-top: 20px; color: #ff4f87;">
                — Luiz Felipe ❤️
            </p>
        </div>
    </div>

            criarParticula();
        }

        // Troca o conteúdo instantaneamente
        document.getElementById('conteudoInicial').style.display = 'none';
        document.getElementById('conteudoFinal').style.display = 'block';
        
        // Remove o clique para não repetir a animação
        document.getElementById('mainCard').style.cursor = 'default';
    }
