<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Montserrat', sans-serif; overflow: hidden;
            touch-action: none; /* Bloqueia o scroll para focar no clique */
        }

        .camada {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* TELA 1 */
        #tela1 {
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            z-index: 30;
        }

        /* TELA 2 */
        #tela2 {
            background: #0a0a0a;
            z-index: 20;
            padding: 20px;
        }

        /* TELA 3 */
        #tela3 {
            background: #000;
            z-index: 10;
        }

        .rosa { font-size: 80px; filter: drop-shadow(0 0 15px #ff4d6d); animation: pulsar 2s infinite; }
        .instrucao { margin-top: 20px; letter-spacing: 3px; font-size: 11px; text-transform: uppercase; color: #ffccd5; }

        h1 { font-family: 'Dancing Script', cursive; font-size: 42px; color: #ff4d6d; margin-bottom: 10px; }
        .texto { font-size: 17px; line-height: 1.6; text-align: center; max-width: 300px; }
        .assinatura { display: block; margin-top: 20px; font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d; }

        .btn-fofo {
            margin-top: 30px; background: #ff4d6d; color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .final { font-family: 'Dancing Script', cursive; font-size: 50px; color: #ff4d6d; text-align: center; }

        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .coracao { position: fixed; pointer-events: none; z-index: 100; font-size: 25px; }
        .subir { transform: translateY(-100%); }
    </style>
</head>
