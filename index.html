<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --accent: #ff85a1;
            --glass: rgba(255, 255, 255, 0.98);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: #fff0f3;
            background: radial-gradient(circle at center, #ffffff 0%, #ffd1dc 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 30px;
            box-shadow: 0 30px 60px rgba(255, 79, 135, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            position: relative;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Estágio Inicial */
        .trigger-area {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .main-heart {
            font-size: 100px;
            display: inline-block;
            filter: drop-shadow(0 10px 20px rgba(255, 77, 109, 0.3));
            animation: floating 2.5s infinite ease-in-out;
        }
