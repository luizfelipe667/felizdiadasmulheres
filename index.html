<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 1200px; /* Base para o efeito 3D */
        }

        /* Fundo com aura de luz */
        .bg-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #450a18 0%, #000 100%);
            z-index: 1;
        }

        /* O CARTÃO INOVADOR (PARALAXE) */
        #cartao {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 60px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
            color: white;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
        }

        /* Efeito de iluminação interna que se move */
        #cartao::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.15) 0%, transparent 60%);
            border-radius: 40px;
            pointer-events: none;
        }

        .rosa-master {
            font-size: 90px;
            filter: drop-shadow(0 0 20px #ff4d6d);
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #mensagem-container {
            display: none;
            opacity: 0;
            transform: translateZ(50px); /* Texto salta para fora do cartão */
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; margin: 0; color: #fff; }
        .texto-premium { font-size: 18px; line-height: 1.8; margin-top: 25px; font-weight: 300; letter-spacing: 0.5px; }
        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d; }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            border-radius: 50%;
            background: white;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="cartao" onmousemove="handleMove(event)" ontouchmove="handleMove(event)">
        <div id="conteudo-capa">
            <div class="rosa-master" id="rosa">🌹</div>
            <h1>Geovana</h1>
            <p style="text-transform: uppercase; letter-spacing: 4px; font-size: 11px; opacity: 0.6; margin-top: 15px;">Toque para sentir</p>
        </div>

        <div id="mensagem-container">
            <h1>Feliz Dia da Mulher</h1>
            <div class="texto-premium">
                Você é a prova de que a força e a delicadeza podem andar juntas. Sua luz transforma tudo.
                <br>
                <span class="assinatura">— Luiz Felipe ❤️</span>
            </div>
        </div>
    </div>

<script>
    const cartao = document.getElementById('cartao');
    const rosa = document.getElementById('rosa');
    let aberto = false;

    // INOVAÇÃO: Efeito de Inclinação 3D que segue o toque
    function handleMove(e) {
        const rect = cartao.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        
        // Atualiza luz interna
        cartao.style.setProperty('--x', `${(x / rect.width) * 100}%`);
        cartao.style.setProperty('--y', `${(y / rect.height) * 100}%`);

        // Calcula inclinação
        const rotX = ((y / rect.height) - 0.5) * -20;
        const rotY = ((x / rect.width) - 0.5) * 20;

        cartao.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        
        // Deixa rastro de brilho
        criarBrilho(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
    }

    cartao.onclick = function(e) {
        if (aberto) {
            explosaoFinal(e.clientX, e.clientY);
            return;
        }
        aberto = true;
        
        rosa.style.transform = 'scale(0) rotate(-180deg)';
        setTimeout(() => {
            document.getElementById('conteudo-capa').style.display = 'none';
            const msg = document.getElementById('mensagem-container');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.opacity = '1'; }, 50);
            explosaoFinal(window.innerWidth/2, window.innerHeight/2);
        }, 400);
    };

    function criarBrilho(x, y) {
        const b = document.createElement('div');
        b.className = 'sparkle';
        const size = Math.random() * 4 + 2;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = x + 'px';
        b.style.top = y + 'px';
        b.style.boxShadow = '0 0 10px #fff';
        document.body.appendChild(b);

        b.animate([
            { transform: 'translateY(0) scale(1)', opacity: 1 },
            { transform: `translateY(${Math.random()*50}px) scale(0)`, opacity: 0 }
        ], { duration: 800 });
        setTimeout(() => b.remove(), 800);
    }

    function explosaoFinal(x, y) {
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.style.position = 'fixed';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.zIndex = '1000';
            p.innerHTML = ['✨', '❤️', '🌹'][Math.floor(Math.random()*3)];
            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 15 + 5;
            p.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*velocity*20}px, ${Math.sin(angle)*velocity*20}px) scale(0)`, opacity: 0 }
            ], { duration: 1500 });
            setTimeout(() => p.remove(), 1500);
        }
    }

    // Volta o cartão ao normal quando o dedo sai
    window.addEventListener('touchend', () => cartao.style.transform = 'rotateX(0) rotateY(0)');
    window.addEventListener('mouseleave', () => cartao.style.transform = 'rotateX(0) rotateY(0)');
</script>

</body>
</html>
