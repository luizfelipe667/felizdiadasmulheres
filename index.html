<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000; /* Fundo escuro para destacar o brilho */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Fundo Animado Premium */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff4d6d, #ff85a1, #800e26);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            z-index: 1;
            opacity: 0.8;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cartão Efeito Vidro */
        #cartao {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10;
            color: white;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rosa-icon {
            font-size: 80px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            animation: float 3s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        #mensagem-homenagem {
            display: none;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 1s ease;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 42px; margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .sub { font-size: 14px; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.7); margin-top: 10px; }
        .texto { font-size: 18px; line-height: 1.8; margin-top: 30px; font-weight: 300; }
        .destaque { color: #ffccd5; font-weight: 500; display: block; margin-top: 15px; font-size: 20px; }

        .particula {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body onclick="abrirHomenagem(event)">

    <div class="bg-gradient"></div>

    <div id="cartao">
        <div id="capa">
            <div class="rosa-icon">🌹</div>
            <h1>Para Geovana</h1>
            <p class="sub">Toque para revelar</p>
        </div>

        <div id="mensagem-homenagem">
            <h1>Geovana 🌹</h1>
            <div class="texto">
                Neste Dia das Mulheres, quero celebrar a mulher incrível que você é. 
                Sua força é inspiradora e seu brilho ilumina meu mundo.
                <span class="destaque">Você é extraordinária!</span>
                <br>
                <strong style="font-family: 'Dancing Script'; font-size: 28px;">Luiz Felipe ❤️</strong>
            </div>
        </div>
    </div>

    <script>
        let iniciado = false;

        function abrirHomenagem(e) {
            if (iniciado) {
                gerarExplosao(e.clientX, e.clientY);
                return;
            }
            iniciado = true;

            const cartao = document.getElementById('cartao');
            const capa = document.getElementById('capa');
            const msg = document.getElementById('mensagem-homenagem');

            // Som de explosão visual
            gerarExplosao(e.clientX, e.clientY);

            // Transição Premium
            cartao.style.transform = 'rotateY(10deg) scale(1.05)';
            capa.style.opacity = '0';
            
            setTimeout(() => {
                capa.style.display = 'none';
                msg.style.display = 'block';
                setTimeout(() => {
                    msg.style.opacity = '1';
                    msg.style.transform = 'scale(1) translateY(0)';
                    cartao.style.background = 'rgba(255, 255, 255, 0.2)';
                }, 50);
            }, 400);

            // Chuva constante
            setInterval(() => criarParticula(Math.random() * window.innerWidth, -50), 400);
        }

        function gerarExplosao(x, y) {
            for (let i = 0; i < 25; i++) {
                criarParticula(x, y, true);
            }
        }

        function criarParticula(x, y, isExplosion = false) {
            const p = document.createElement('div');
            p.className = 'particula';
            const itens = ['❤️', '✨', '🌹', '🌸', '💎'];
            p.innerHTML = itens[Math.floor(Math.random() * itens.length)];
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(p);

            const duration = Math.random() * 2000 + 2000;
            
            if (isExplosion) {
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 12 + 6;
                const dx = Math.cos(angle) * velocity * 25;
                const dy = Math.sin(angle) * velocity * 25;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
                ], { duration: 1200, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' });
            } else {
                p.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: 0.8 },
                    { transform: `translate(${(Math.random()-0.5)*100}px, 110vh) rotate(360deg)`, opacity: 0 }
                ], { duration: duration, easing: 'linear' });
            }

            setTimeout(() => p.remove(), duration);
        }
    </script>
</body>
</html>
