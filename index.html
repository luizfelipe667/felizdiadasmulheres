<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; background-color: #000;
            color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; touch-action: none;
        }

        .pagina {
            position: fixed; inset: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 30px;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        #tela1 {
            background: radial-gradient(circle at center, #3d0a1a 0%, #000 100%);
            z-index: 30;
        }

        #tela2 {
            background: #050505;
            z-index: 20;
            opacity: 0;
            filter: blur(10px);
            transform: scale(1.1);
        }

        #tela3 {
            background: #000;
            z-index: 10;
            display: none;
        }

        .flor {
            font-size: 90px; filter: drop-shadow(0 0 20px #ff4d6d);
            animation: pulsar 2.5s infinite ease-in-out;
            pointer-events: none;
        }

        .piscar {
            margin-top: 30px; letter-spacing: 4px; font-size: 11px;
            text-transform: uppercase; color: #ffccd5;
            animation: brilho 2s infinite;
            pointer-events: none;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 42px; color: #ff4d6d; margin-bottom: 25px; }
        
        .texto { 
            font-size: 18px; 
            line-height: 1.8; 
            max-width: 340px; 
            font-weight: 400;
            text-align: center;
        }

        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 34px; color: #ff4d6d; }

        .btn-premium {
            background: linear-gradient(135deg, #ff4d6d 0%, #c9184a 100%);
            color: white; border: none; padding: 18px 50px; border-radius: 50px;
            font-weight: 600; font-size: 15px; margin-top: 40px;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.3);
            cursor: pointer;
        }

        .final-msg { font-family: 'Dancing Script', cursive; font-size: 65px; color: #ff4d6d; }

        .transicao-ativa {
            opacity: 0 !important;
            filter: blur(20px) !important;
            transform: scale(0.8) !important;
            pointer-events: none !important;
        }

        @keyframes pulsar { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #ff4d6d); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 30px #ff4d6d); } }
        @keyframes brilho { 0%, 100% { opacity: 0.2; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }

        .coracao { position: fixed; pointer-events: none; z-index: 100; font-size: 28px; }
    </style>
</head>
<body>

    <div id="tela1" class="pagina">
        <div class="flor">🌹</div>
        <div class="piscar">Clique na tela ✨</div>
    </div>

    <div id="tela2" class="pagina">
        <h1>Geovana 🌹</h1>
        <div class="texto">
            Feliz dia da mulher, meu amor! Você é uma mulher incrível, e eu não poderia deixar de homenagear a mulher que eu tanto amo! Obrigado por fazer parte da minha vida.
            <span class="assinatura">— Luiz Felipe ❤️</span>
        </div>
        <button class="btn-premium" id="btnFinal">Clique aqui ❤️</button>
    </div>

    <div id="tela3" class="pagina">
        <div class="final-msg">Te amo muito!</div>
        <div style="font-size: 70px; margin-top: 25px; filter: drop-shadow(0 0 15px red);">💖</div>
    </div>

<script>
    const t1 = document.getElementById('tela1');
    const t2 = document.getElementById('tela2');
    const t3 = document.getElementById('tela3');
    const btn = document.getElementById('btnFinal');

    function irParaMensagem() {
        t1.classList.add('transicao-ativa');
        setTimeout(() => {
            t1.style.display = 'none';
            t2.style.opacity = '1';
            t2.style.filter = 'blur(0)';
            t2.style.transform = 'scale(1)';
        }, 800);
    }

    function irParaFinal(e) {
        if(e) e.stopPropagation();
        t2.classList.add('transicao-ativa');
        setTimeout(() => {
            t2.style.display = 'none';
            t3.style.display = 'flex';
            t3.style.opacity = '0';
            setTimeout(() => { 
                t3.style.opacity = '1'; 
                setInterval(criarCoracao, 350);
            }, 50);
        }, 800);
    }

    t1.addEventListener('pointerdown', irParaMensagem);
    btn.addEventListener('pointerdown', irParaFinal);

    function criarCoracao() {
        const c = document.createElement('div');
        c.className = 'coracao';
        c.innerHTML = '❤️';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '100vh';
        document.body.appendChild(c);
        
        c.animate([
            { transform: 'translateY(0) scale(1) rotate(0deg)', opacity: 1 },
            { transform: `translateY(-110vh) scale(0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
        ], { duration: 4000, easing: 'ease-out' }).onfinish = () => c.remove();
    }
</script>
</body>
</html>
