<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para você 🌹</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle,#3a001d,#120008);
font-family:serif;
color:white;
}

#texto{
position:absolute;
top:18%;
width:100%;
text-align:center;
font-size:22px;
opacity:0.9;
letter-spacing:2px;
}

#mensagem{
position:absolute;
bottom:20%;
width:100%;
text-align:center;
font-size:28px;
opacity:0;
transition:2s;
}

canvas{
display:block;
}

</style>

</head>
<body>

<div id="texto">🌹 Toque na rosa</div>

<div id="mensagem">
Feliz Dia da Mulher ❤️
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 6

let renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


// LUZ

let light1 = new THREE.PointLight(0xff6699,3)
light1.position.set(5,5,5)
scene.add(light1)

let light2 = new THREE.PointLight(0xffffff,2)
light2.position.set(-5,3,3)
scene.add(light2)

let ambient = new THREE.AmbientLight(0xffffff,1.5)
scene.add(ambient)


// GRUPO DA ROSA

let rose = new THREE.Group()

scene.add(rose)


// CRIAR PETALAS

let petalas=[]

for(let i=0;i<20;i++){

let geo = new THREE.SphereGeometry(0.8,32,32)

let mat = new THREE.MeshStandardMaterial({
color:0xff2e6e,
roughness:0.6,
metalness:0.1
})

let petala = new THREE.Mesh(geo,mat)

petala.scale.set(0.5,0.15,0.7)

let angle = i * (Math.PI*2/20)

petala.position.x = Math.cos(angle)*1
petala.position.y = Math.sin(angle)*1

petala.rotation.z = angle

rose.add(petala)

petalas.push(petala)

}


// CENTRO DA ROSA

let centroGeo = new THREE.SphereGeometry(0.4,32,32)

let centroMat = new THREE.MeshStandardMaterial({
color:0xff0044
})

let centro = new THREE.Mesh(centroGeo,centroMat)

rose.add(centro)


// CAULE

let cauleGeo = new THREE.CylinderGeometry(0.05,0.05,4,16)

let cauleMat = new THREE.MeshStandardMaterial({
color:0x1fa63a
})

let caule = new THREE.Mesh(cauleGeo,cauleMat)

caule.position.y=-2

rose.add(caule)


// PÉTALAS CAINDO

let petals=[]

function createPetal(){

let geo = new THREE.PlaneGeometry(0.25,0.25)

let mat = new THREE.MeshBasicMaterial({
color:0xff6699,
side:THREE.DoubleSide
})

let p = new THREE.Mesh(geo,mat)

p.position.x=(Math.random()-0.5)*6
p.position.y=4
p.position.z=(Math.random()-0.5)*3

scene.add(p)

petals.push(p)

}

setInterval(createPetal,200)


// INTERAÇÃO

let aberta=false

window.addEventListener("click",()=>{

if(!aberta){

aberta=true

if(navigator.vibrate)
navigator.vibrate(200)

document.getElementById("mensagem").style.opacity=1

petalas.forEach((p,i)=>{

setTimeout(()=>{

p.rotation.x += 1.5
p.position.y +=0.5

},i*100)

})

}

})


// ANIMAÇÃO

function animate(){

requestAnimationFrame(animate)

rose.rotation.y+=0.01

petals.forEach(p=>{

p.position.y -=0.02

p.rotation.z+=0.03

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
