<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4f87;
            --secondary: #ff85a1;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #ffd1dc 100%);
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Montserrat', sans-serif;
            color: #4a1324;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Fundo com corações flutuantes constantes */
        .bg-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 50px 30px;
            box-shadow: 0 20px 50px rgba(255, 79, 135, 0.15);
            text-align: center;
            z-index: 10;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .heart-area {
            font-size: 100px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(255, 79, 135, 0.4));
            animation: pulse-premium 2s infinite ease-in-out;
            transition: transform 0.3s ease;
        }

        .heart-area:hover { transform: scale(1.15); }

        @keyframes pulse-premium {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 5px 15px rgba(255, 79, 135, 0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 10px 25px rgba(255, 79, 135, 0.6)); }
        }

        .btn-reveal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 79, 135, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            display: none;
        }

        .btn-reveal.show {
            display: block;
            animation: slideUp 0.6s forwards;
        }

        .final-content {
            display: none;
            opacity: 0;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 38px;
            margin: 0 0 20px 0;
        }

        .message {
            font-size: 17px;
            line-height: 1.7;
            font-weight: 400;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            margin-top: 30px;
            color: var(--primary);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="bg-hearts" id="bgHearts"></div>

<div class="container" id="card">
    <div id="step1">
        <div class="heart-area" onclick="handleHeartClick()">❤️</div>
        <p style="color: #a06e7e; font-weight: 300;">Um segredo para você...</p>
        <button class="btn-reveal" id="nextBtn" onclick="handleNextClick()">Abrir com Amor</button>
    </div>

    <div id="step2" class="final-content">
        <h1>Geovana 🌹</h1>
        <div class="message">
            Você é a luz que transforma os meus dias em algo extraordinário. 
            <br><br>
            Sua força e sua doçura me encantam a cada segundo. Feliz Dia da Mulher para a pessoa mais especial que eu conheço.
            <br><br>
            <strong>Eu te amo infinitamente.</strong>
        </div>
        <div class="signature">— Luiz Felipe ❤️</div>
    </div>
</div>

    }
