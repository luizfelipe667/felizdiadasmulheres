<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Fundo de Galáxia */
        .bg {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        #envelope {
            width: 90%;
            max-width: 360px;
            height: 400px;
            position: relative;
            z-index: 10;
            cursor: pointer;
        }

        /* Partes que vão abrir */
        .aba {
            position: absolute;
            width: 100%;
            height: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 183, 197, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        .aba-topo { top: 0; border-radius: 30px 30px 0 0; border-bottom: 2px solid #ff4d6d; }
        .aba-baixo { bottom: 0; border-radius: 0 0 30px 30px; }

        /* Mensagem escondida */
        #conteudo {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0;
            transition: opacity 1s;
            z-index: 5;
        }

        h1 { font-size: 32px; color: #ff4d6d; margin: 0; }
        p { font-size: 18px; line-height: 1.6; color: #eee; }

        .estrela {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 20px;
        }
    </style>
</head>
<body onmousemove="rastrear(event)" ontouchmove="rastrear(event)" onclick="abrir()">

    <div class="bg"></div>

    <div id="envelope">
        <div class="aba aba-topo" id="topo">
            <span style="font-size: 60px;">🌹</span>
            <h2 style="color: white; margin-top: 10px;">Para Geovana</h2>
        </div>

        <div id="conteudo">
            <h1>Geovana 🌹</h1>
            <p><strong>Feliz Dia da Mulher!</strong></p>
            <p>Sua força e beleza brilham como as estrelas. Você é extraordinária!</p>
            <p style="color: #ff4d6d; font-weight: bold; font-size: 24px;">— Luiz Felipe ❤️</p>
        </div>

        <div class="aba aba-baixo" id="baixo">
            <p style="color: rgba(255,255,255,0.5); letter-spacing: 2px; font-size: 12px;">TOQUE PARA ABRIR</p>
        </div>
    </div>

<script>
    let jaAberto = false;

    // EFEITO DAS ESTRELINHAS QUE VOCÊ AMOU (Agora no movimento)
    function rastrear(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        
        const s = document.createElement('div');
        s.className = 'estrela';
        s.innerHTML = '✨';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        document.body.appendChild(s);

        s.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*50}px, 50px) scale(0)`, opacity: 0 }
        ], { duration: 800 });

        setTimeout(() => s.remove(), 800);
    }

    function abrir() {
        if (jaAberto) return;
        jaAberto = true;

        // Animação de Abrir/Rasgar
        document.getElementById('topo').style.transform = 'translateY(-110%)';
        document.getElementById('baixo').style.transform = 'translateY(110%)';
        
        setTimeout(() => {
            document.getElementById('conteudo').style.opacity = '1';
            
            // Explosão final de estrelas
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const x = window.innerWidth/2 + (Math.random()-0.5)*100;
                    const y = window.innerHeight/2 + (Math.random()-0.5)*100;
                    rastrear({clientX: x, clientY: y});
                }, i * 50);
            }
        }, 400);
    }
</script>

</body>
</html>
