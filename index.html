<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 2000px;
        }

        .bg-gradient {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b0610 0%, #000 100%);
            z-index: 1;
        }

        /* CONTAINER DO MOSAICO */
        #grade-container {
            width: 90vw;
            height: 70vh;
            max-width: 400px;
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colunas */
            grid-template-rows: repeat(4, 1fr);    /* 4 linhas */
            gap: 4px;
        }

        /* CADA BLOCO DO MOSAICO */
        .bloco {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 183, 197, 0.3);
            transition: all 1s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }

        /* ROSA CENTRALIZADA SOBRE OS BLOCOS */
        #rosa-central {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            font-size: 80px;
            filter: drop-shadow(0 0 20px #ff4d6d);
            transition: all 0.8s ease;
            pointer-events: none;
        }

        /* MENSAGEM FINAL (POR TRÁS DE TUDO) */
        #mensagem-final {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s ease;
            z-index: 5;
            padding: 20px;
            pointer-events: none;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin: 0; }
        p { font-size: 18px; line-height: 1.6; font-weight: 300; color: #fff; }
        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 32px; color: #ffb7c5; }

        /* ESTRELINHAS NO RASTRO */
        .estrela-trail {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            color: white;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
            font-size: 24px;
        }
    </style>
</head>
<body onmousemove="rastro(event)" ontouchmove="rastro(event)" onclick="abrirMosaico(event)">

    <div class="bg-gradient"></div>

    <div id="grade-container">
        <div id="rosa-central">🌹</div>

        <div class="bloco"></div><div class="bloco"></div><div class="bloco"></div>
        <div class="bloco"></div><div class="bloco"></div><div class="bloco"></div>
        <div class="bloco"></div><div class="bloco"></div><div class="bloco"></div>
        <div class="bloco"></div><div class="bloco"></div><div class="bloco"></div>

        <div id="mensagem-final">
            <h1>Geovana 🌹</h1>
            <p><strong>Feliz Dia da Mulher!</strong></p>
            <p>Sua existência torna o mundo um lugar mais bonito e iluminado.</p>
            <p>Você é uma mulher extraordinária e forte!</p>
            <span class="assinatura">— Luiz Felipe ❤️</span>
        </div>
    </div>

<script>
    let aberto = false;

    // EFEITO DAS ESTRELINHAS QUE VOCÊ ADOROU
    function rastro(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        
        const s = document.createElement('div');
        s.className = 'estrela-trail';
        s.innerHTML = '✨';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        document.body.appendChild(s);

        s.animate([
            { transform: 'translate(-50%, -50%) scale(1.5)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*120}px, ${(Math.random()-0.5)*120}px) scale(0)`, opacity: 0 }
        ], { duration: 1000 });

        setTimeout(() => s.remove(), 1000);
    }

    function abrirMosaico(e) {
        if (aberto) {
            explosao(e.clientX || (e.touches && e.touches[0].clientX), e.clientY || (e.touches && e.touches[0].clientY));
            return;
        }
        aberto = true;

        const rosa = document.getElementById('rosa-central');
        const blocos = document.querySelectorAll('.bloco');
        const m = document.getElementById('mensagem-final');

        // A rosa explode em brilho e some
        rosa.style.transform = 'translate(-50%, -50%) scale(0) rotate(360deg)';
        rosa.style.opacity = '0';

        // Cada bloco voa para uma direção diferente com rotação
        blocos.forEach((bloco, index) => {
            const randomX = (Math.random() - 0.5) * 1000;
            const randomY = (Math.random() - 0.5) * 1000;
            const randomRotate = (Math.random() - 0.5) * 500;
            
            setTimeout(() => {
                bloco.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${randomRotate}deg) scale(0)`;
                bloco.style.opacity = '0';
            }, index * 30); // Efeito cascata suave
        });

        // Mensagem surge após a explosão dos blocos
        setTimeout(() => {
            m.style.opacity = '1';
            m.style.transform = 'scale(1)';
            
            // Chuva de estrelas final
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    explosao(window.innerWidth/2, window.innerHeight/2);
                }, i * 50);
            }
        }, 600);
    }

    function explosao(x, y) {
        const e = document.createElement('div');
        e.className = 'estrela-trail';
        e.innerHTML = ['✨', '💖', '🌹'][Math.floor(Math.random()*3)];
        e.style.left = x + 'px';
        e.style.top = y + 'px';
        document.body.appendChild(e);

        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 150;

        e.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
        ], { duration: 1200 });

        setTimeout(() => e.remove(), 1200);
    }
</script>

</body>
</html>
