<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Geovana</title>
    <style>
        body {
            background-color: #ffebee;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        #cartao {
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ff4081;
            cursor: pointer;
        }
        .coracao {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 { color: #ff4081; font-size: 24px; margin-bottom: 10px; }
        p { color: #555; line-height: 1.5; }
        
        /* Escondido no começo */
        #mensagem { display: none; }
        
        .emoji {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body onclick="abrir()">

    <div id="cartao">
        <div id="capa">
            <div class="coracao">❤️</div>
            <h1>Para Geovana</h1>
            <p>Toque em qualquer lugar da tela...</p>
        </div>

        <div id="mensagem">
            <h1 style="font-size: 30px;">Geovana 🌹</h1>
            <p><strong>Feliz Dia da Mulher!</strong></p>
            <p>Hoje o dia é seu, mas o presente é meu por ter você. Sua força e beleza inspiram tudo ao seu redor. Você é extraordinária!</p>
            <p style="margin-top: 20px; color: #ff4081; font-weight: bold;">— Luiz Felipe ❤️</p>
        </div>
    </div>

    <script>
        function abrir() {
            // Mostra a mensagem e esconde a capa
            document.getElementById('capa').style.display = 'none';
            document.getElementById('mensagem').style.display = 'block';
            document.getElementById('cartao').style.borderColor = '#ff80ab';

            // Efeito simples de corações subindo
            for(let i=0; i<15; i++) {
                let e = document.createElement('div');
                e.className = 'emoji';
                e.innerHTML = '❤️';
                e.style.left = Math.random() * 100 + 'vw';
                e.style.top = '100vh';
                e.style.fontSize = '30px';
                document.body.appendChild(e);
                
                let pos = 100;
                let intervalo = setInterval(() => {
                    pos -= 2;
                    e.style.top = pos + 'vh';
                    if(pos < -10) {
                        clearInterval(intervalo);
                        e.remove();
                    }
                }, 20);
            }
        }
    </script>
</body>
</html>
