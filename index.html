<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4f87;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fce4ec 0%, #ffd1dc 100%);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(255, 79, 135, 0.2);
            text-align: center;
            position: relative;
            z-index: 100; /* Garante que o card esteja no topo */
        }

        .heart-area {
            font-size: 90px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            user-select: none;
            transition: transform 0.2s;
            animation: pulse 1.5s infinite ease-in-out;
            position: relative;
            z-index: 110;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn-reveal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            display: none; /* Inicialmente escondido */
            width: 100%;
            box-shadow: 0 8px 15px rgba(255, 79, 135, 0.3);
        }

        .final-content {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 35px; margin-bottom: 15px; }
        .message { font-size: 17px; line-height: 1.6; color: #4a1324; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 24px; margin-top: 25px; color: var(--primary); }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="step1">
        <div class="heart-area" id="mainHeart">❤️</div>
        <p id="instruction" style="color: #a06e7e;">Toque no coração, Geovana</p>
        <button class="btn-reveal" id="nextBtn">Para você...</button>
    </div>

    <div id="step2" class="final-content">
        <h1>Geovana 🌹</h1>
        <div class="message">
            Você é a luz que transforma os meus dias em algo extraordinário. 
            <br><br>
            <strong>Te amo infinitamente.</strong>
        </div>
        <div class="signature">— Luiz Felipe ❤️</div>
    </div>
</div>

<script>
    const heart = document.getElementById('mainHeart');
    const nextBtn = document.getElementById('nextBtn');
    const step1Content = document.getElementById('step1');
    const step2Content = document.getElementById('step2');
    const instruction = document.getElementById('instruction');

    // Função única para clique/toque no Coração
    function startExperience(e) {
        e.preventDefault();
        explode();
        
        heart.style.display = 'none';
        instruction.style.display = 'none';
        nextBtn.style.display = 'block';
    }

    // Função única para o Botão "Para você"
    function showMessage(e) {
        e.preventDefault();
        explode();
        
        step1Content.style.display = 'none';
        step2Content.style.display = 'block';
        setTimeout(() => { step2Content.style.opacity = '1'; }, 50);
    }

    // Eventos robustos para Mobile e Desktop
    heart.addEventListener('click', startExperience);
    heart.addEventListener('touchstart', startExperience);

    nextBtn.addEventListener('click', showMessage);
    nextBtn.addEventListener('touchstart', showMessage);
