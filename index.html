<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background: #fce4ec;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed; /* Evita que a tela suba/desça no clique */
        }

        .container {
            width: 85%;
            max-width: 350px;
            background: white;
            border-radius: 25px;
            padding: 40px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 999; /* Garante que está na frente de TUDO */
        }

        /* Transformando o coração em um botão real para não falhar o toque */
        .btn-heart {
            background: none;
            border: none;
            font-size: 80px;
            cursor: pointer;
            padding: 0;
            margin: 0 auto 20px;
            display: block;
            animation: pulse 1.5s infinite ease-in-out;
            outline: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .btn-action {
            background: #ff4f87;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            display: none;
        }

        .step2 {
            display: none;
        }

        h1 { font-family: 'Dancing Script', cursive; color: #ff4f87; font-size: 32px; margin: 0 0 15px; }
        .message { font-size: 16px; line-height: 1.6; color: #3d1422; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 24px; margin-top: 20px; color: #ff4f87; }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="tela1">
        <button class="btn-heart" id="heartBtn" aria-label="Coração">❤️</button>
        <p id="txt" style="color: #888;">Toque no coração, Geovana</p>
        <button class="btn-action" id="nextBtn">Para você...</button>
    </div>

    <div id="tela2" class="step2">
        <h1>Geovana 🌹</h1>
        <div class="message">
            Você é a luz que transforma os meus dias em algo extraordinário. 
            <br><br>
            <strong>Te amo infinitamente.</strong>
        </div>
        <div class="signature">— Luiz Felipe ❤️</div>
    </div>
</div>

<script>
    const heartBtn = document.getElementById('heartBtn');
    const nextBtn = document.getElementById('nextBtn');
    const tela1 = document.getElementById('tela1');
    const tela2 = document.getElementById('tela2');
    const txt = document.getElementById('txt');

    // Função de clique unificada
    function triggerHeart() {
        explode();
        heartBtn.style.display = 'none';
        txt.style.display = 'none';
        nextBtn.style.display = 'block';
    }

    function triggerFinal() {
        explode();
        tela1.style.display = 'none';
        tela2.style.display = 'block';
    }

    // Eventos para o Coração
    heartBtn.onclick = triggerHeart;
    heartBtn.ontouchstart = (e) => { e.preventDefault(); triggerHeart(); };

    // Eventos para o Botão Final
    nextBtn.onclick = triggerFinal;
    nextBtn.ontouchstart = (e) => { e.preventDefault(); triggerFinal(); };
