<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homenagem - Dia da Mulher ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #fff0f3; /* Rosa bem clarinho e elegante */
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Card com Glassmorphism suave */
        .card {
            width: 90%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 45px 25px;
            box-shadow: 0 25px 50px rgba(255, 79, 135, 0.15);
            text-align: center;
            position: relative;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.5s ease;
        }

        /* Elementos da Tela Inicial */
        #camada-inicial {
            transition: opacity 0.5s ease;
        }

        .botao-coracao {
            font-size: 85px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(255, 79, 135, 0.3));
            animation: flutuar 3s infinite ease-in-out;
        }
