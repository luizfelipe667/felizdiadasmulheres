<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Fundo de Estrelas Estático (Leve) */
        .bg {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a050d 0%, #000 100%);
            z-index: 1;
        }

        /* Cartão Luxo - Agora com transições simples e rápidas */
        #cartao {
            width: 90%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 50px 25px;
            border: 1px solid rgba(255, 183, 197, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
            color: white;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .rosa-master {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: flutuar 3s infinite ease-in-out;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #mensagem {
            display: none;
            opacity: 0;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 40px; color: #fff; margin: 0; }
        .texto { font-size: 16px; line-height: 1.8; margin-top: 25px; font-weight: 300; }
        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 30px; color: #ff4d6d; }

        /* Estrelinhas (O efeito que você amou, agora otimizado) */
        .estrela {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 20px;
        }
    </style>
</head>
<body onclick="abrir(event)">

    <div class="bg"></div>

    <div id="cartao">
        <div id="capa">
            <div class="rosa-master">🌹</div>
            <h1>Para Geovana</h1>
            <p style="letter-spacing: 3px; font-size: 10px; opacity: 0.6; margin-top: 15px;">TOQUE NA TELA</p>
        </div>

        <div id="mensagem">
            <h1>Geovana 🌹</h1>
            <div class="texto">
                Feliz Dia da Mulher! <br>
                Sua força e beleza inspiram tudo ao seu redor. Você é extraordinária e merece todo o brilho do mundo.
                <span class="assinatura">— Luiz Felipe ❤️</span>
            </div>
        </div>
    </div>

<script>
    let aberto = false;

    function abrir(e) {
        // Estrelinhas no toque (sempre funcionam)
        criarEstrela(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);

        if (aberto) return;
        aberto = true;

        const cartao = document.getElementById('cartao');
        const capa = document.getElementById('capa');
        const msg = document.getElementById('mensagem');

        // Feedback visual imediato no toque
        cartao.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
            capa.style.display = 'none';
            msg.style.display = 'block';
            cartao.style.transform = 'scale(1)';
            cartao.style.background = 'rgba(255, 255, 255, 0.15)';
            
            // Suavidade na aparição do texto
            setTimeout(() => { msg.style.opacity = '1'; msg.style.transition = 'opacity 1s'; }, 50);
            
            // Explosão de estrelas central
            for(let i=0; i<20; i++) {
                setTimeout(() => criarEstrela(window.innerWidth/2, window.innerHeight/2), i * 50);
            }
        }, 150);
    }

    function criarEstrela(x, y) {
        const s = document.createElement('div');
        s.className = 'estrela';
        s.innerHTML = '✨';
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        document.body.appendChild(s);

        const destX = (Math.random() - 0.5) * 200;
        const destY = (Math.random() - 0.5) * 200;

        s.animate([
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
            { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
        ], { duration: 1000, easing: 'ease-out' });

        setTimeout(() => s.remove(), 1000);
    }
</script>

</body>
</html>
