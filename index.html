<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4f87;
            --dark-text: #3d1422;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #fce4ec, #ffd1dc, #fce4ec);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Poppins', sans-serif;
            color: var(--dark-text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Necessário para o efeito de rastro */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Principal */
        .container {
            width: 85%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(255, 79, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
            text-align: center;
            position: relative;
        }

        .text-area {
            font-size: 19px;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 100px;
        }

        .heart-btn {
            font-size: 60px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s;
            animation: float 2s ease-in-out infinite;
            filter: drop-shadow(0 5px 10px rgba(255, 79, 135, 0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }

        .btn-final {
            background: linear-gradient(45deg, var(--primary), #ff85a1);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 79, 135, 0.3);
            display: none;
            margin: 0 auto;
        }

        .final-msg {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Partículas de rastro (efeito pro) */
        .trail {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            filter: blur(2px);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <div id="content1">
        <div class="heart-btn" onclick="iniciarLeitura()">❤️</div>
        <div class="text-area" id="typewriter"></div>
        <button class="btn-final" id="btnNext" onclick="mostrarFinal()">Toque aqui, Geovana</button>
    </div>

    <div id="content2" class="final-msg">
        <span style="font-size: 34px; color: var(--primary);">Feliz Dia da Mulher 🌹</span>
        <br><br>
        Geovana, você é uma das coisas mais bonitas que já aconteceram na minha vida.
        <br><br>
        Seu sorriso ilumina meus dias e sua presença deixa tudo mais especial.
        <br><br>
        <strong>Te amo.</strong>
        <br><br>
        <span style="font-size: 18px; color: #777;">— Luiz Felipe ❤️</span>
    </div>
</div>
