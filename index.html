<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Geovana ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(180deg,#ffd1dc,#ffb6c1);
font-family:'Dancing Script', cursive;
text-align:center;
color:#5a0030;
}

/* CORAÇÃO */

#coracao{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
animation:pulse 1.5s infinite;
z-index:3;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.25)}
100%{transform:translate(-50%,-50%) scale(1)}
}

/* DEDO */

#dedo{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,0);
font-size:50px;
animation:clicar 1.5s infinite;
pointer-events:none;
z-index:4;
}

@keyframes clicar{

0%{transform:translate(-50%,0); opacity:0}

30%{opacity:1}

60%{transform:translate(-50%,-20px)}

100%{opacity:0}

}

/* MENSAGEM */

#mensagem{
position:absolute;
bottom:12%;
width:90%;
left:5%;
font-size:32px;
line-height:1.5;
color:#5a0030;
font-weight:700;
z-index:2;
}

/* PÉTALAS */

.petala{
position:absolute;
font-size:22px;
pointer-events:none;
animation:cair linear infinite;
z-index:1;
}

@keyframes cair{
0%{transform:translateY(-50px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* PARTÍCULAS */

.particula{
position:absolute;
font-size:22px;
pointer-events:none;
}

</style>

</head>

<body>

<div id="coracao">❤️</div>
<div id="dedo">👆</div>

<div id="mensagem"></div>

<script>

const coracao = document.getElementById("coracao")

coracao.addEventListener("click",abrir)

function abrir(){

explodir()

document.getElementById("dedo").style.display="none"

coracao.style.display="none"

escreverMensagem()

if(navigator.vibrate){
navigator.vibrate([120,60,120])
}

}

/* TEXTO SENDO ESCRITO */

const texto = `Geovana,

Hoje é o Dia da Mulher,
mas qualquer dia
fica mais bonito
quando você aparece.

Seu sorriso ilumina,
seu carinho acolhe,
e seu jeito torna
tudo mais especial.

Que a vida sempre
te abrace com a mesma
delicadeza que você
espalha por onde passa.

Feliz Dia da Mulher 💖`

let i=0

function escreverMensagem(){

const el = document.getElementById("mensagem")

function digitar(){

if(i < texto.length){

el.innerHTML += texto.charAt(i)

i++

setTimeout(digitar,40)

}

}

digitar()

}

/* EXPLOSÃO */

function explodir(){

for(let i=0;i<60;i++){

let p=document.createElement("div")

p.className="particula"

p.innerHTML=Math.random()>0.5?"💖":"✨"

p.style.left="50vw"
p.style.top="50vh"

document.body.appendChild(p)

let x=(Math.random()-0.5)*800
let y=(Math.random()-0.5)*800

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1500,
easing:"ease-out"
})

setTimeout(()=>p.remove(),1500)

}

}

/* PÉTALAS */

function criarPetala(){

let p=document.createElement("div")

p.className="petala"

p.innerHTML="🌸"

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(6+Math.random()*4)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),9000)

}

setInterval(criarPetala,400)

</script>

</body>
</html>
