<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 2000px;
        }

        .bg-gradient {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b0610 0%, #000 100%);
            z-index: 1;
        }

        /* O VIDRO QUE IRÁ QUEBRAR */
        #vidro-container {
            width: 90vw;
            height: 70vh;
            max-width: 400px;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Camada de vidro visual antes de quebrar */
        #vidro-superficie {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        /* Estilhaços que serão gerados via JS */
        .estilhaco {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); /* Forma de triângulo/caco */
            pointer-events: none;
            z-index: 25;
        }

        #rosa-central {
            font-size: 80px;
            filter: drop-shadow(0 0 20px #ff4d6d);
            margin-bottom: 20px;
        }

        .instrucao {
            color: white;
            letter-spacing: 4px;
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
            animation: pulsar 2s infinite;
        }

        @keyframes pulsar {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* MENSAGEM FINAL */
        #mensagem-final {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.2s ease;
            z-index: 5;
            padding: 20px;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin: 0; }
        p { font-size: 18px; line-height: 1.6; font-weight: 300; color: #fff; }
        .assinatura { display: block; margin-top: 30px; font-family: 'Dancing Script'; font-size: 32px; color: #ffb7c5; }

        .estrela-trail {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 10px #fff;
            font-size: 22px;
        }
    </style>
</head>
<body onmousemove="rastro(event)" ontouchmove="rastro(event)">

    <div class="bg-gradient"></div>

    <div id="vidro-container" onclick="quebrarVidro(event)">
        <div id="vidro-superficie">
