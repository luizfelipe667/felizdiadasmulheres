<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Estrutura de Camadas (Transição de Cortina) */
        .secao {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* TELA 1 */
        #tela1 {
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            z-index: 30;
            cursor: pointer;
        }

        /* TELA 2 */
        #tela2 {
            background: #0a0a0a;
            z-index: 20;
            padding: 20px;
        }

        /* TELA 3 */
        #tela3 {
            background: #000;
            z-index: 10;
        }

        /* Estilização dos Elementos */
        .rosa {
            font-size: 85px;
            filter: drop-shadow(0 0 20px #ff4d6d);
            animation: pulsar 2s infinite ease-in-out;
        }

        .instrucao {
            margin-top: 25px;
            letter-spacing: 3px;
            font-size: 11px;
            text-transform: uppercase;
            color: #ffccd5;
            opacity: 0.8;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin-bottom: 15px; }
        .texto { font-size: 18px; line-height: 1.8; text-align: center; max-width: 320px; }
        .assinatura { display: block; margin-top: 25px; font-family: 'Dancing Script'; font-size: 32px; color: #ff4d6d; }

        .btn-fofo {
            margin-top: 40px;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            cursor: pointer;
        }

        .final { font-family: 'Dancing Script', cursive; font-size: 55px; color: #ff4d6d; text-align: center; }

        @keyframes pulsar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .coracao {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        /* Classe para disparar a transição */
        .subir { transform: translateY(-100%); }
    </style>
</head>
<body>

    <div id="tela1" class="secao" onclick="irParaMensagem()">
        <div class="rosa">🌹</div>
        <div class="instrucao">Clique na tela ✨</div>
    </div>

    <div id="tela2" class="secao">
        <h1>Geovana 🌹</h1>
        <div class="texto">
            Você é extraordinária e merece ser celebrada todos os dias!
            <span class="assinatura">— Luiz Felipe ❤️</span>
        </div>
        <button class="btn-fofo" onclick="irParaFinal()">Clique aqui ❤️</button>
    </div>

    <div id="tela3" class="secao">
        <div class="final">Te amo muito!</div>
        <div style="font-size: 60px; margin-top: 20px; filter: drop-shadow(0 0 10px red);">💖</div>
    </div>

<script>
    // Função para ir da Tela 1 para a Tela 2
    function irParaMensagem() {
        const tela1 = document.getElementById('tela1');
        tela1.classList.add('subir');
        
        // Pequena explosão de corações ao abrir
        for(let i=0; i<15; i++) {
            setTimeout(criarCoracao, i * 50);
        }
    }

    // Função para ir da Tela 2 para a Tela 3
    function irParaFinal() {
        const tela2 = document.getElementById('tela2');
        tela2.classList.add('subir');
        
        // Chuva constante de corações no final
        setInterval(criarCoracao, 300);
    }
