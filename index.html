<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Geovana ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* TELA 1: INICIAL */
        #tela1 {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2b0610 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .rosa {
            font-size: 80px;
            filter: drop-shadow(0 0 15px #ff4d6d);
            animation: pulsar 1.5s infinite ease-in-out;
        }

        .instrucao {
            margin-top: 20px;
            letter-spacing: 2px;
            font-size: 12px;
            text-transform: uppercase;
            color: #ffccd5;
        }

        /* TELA 2: MENSAGEM */
        #tela2 {
            display: none;
            width: 85%;
            max-width: 400px;
            text-align: center;
            z-index: 50;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #ff4d6d; margin-bottom: 10px; }
        .texto { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        /* TELA 3: TE AMO */
        #tela3 {
            display: none;
            text-align: center;
            z-index: 50;
        }

        .final { font-family: 'Dancing Script', cursive; font-size: 60px; color: #ff4d6d; }

        @keyframes pulsar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .coracao {
            position: fixed;
            pointer-events: none;
            font-size: 25px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="tela1" onclick="irParaTela2()">
        <div class="rosa">🌹</div>
        <div class="instrucao">Toque na rosa ✨</div>
    </div>

    <div id="tela2">
        <h1>Geovana 🌹</h1>
        <div class="texto">
            Você é extraordinária e merece ser
